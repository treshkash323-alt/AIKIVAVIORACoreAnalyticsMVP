<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AIKIVAVIORA Core Analytics MVP</title>

    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="background-glow"></div>

    <div class="main-container">

        <header class="header">

            <h1>AIKIVAVIORA</h1>

            <p class="subtitle">
                Core Analytics MVP
            </p>

            <div class="status-bar">
                <span class="status-online"></span>
                SYSTEM ONLINE
            </div>

        </header>

        <main class="chat-container">

            <div class="chat-window" id="chat-window">

                <div class="ai-message">
                    Добро пожаловать в AIKIVAVIORA Core Analytics MVP.
                </div>

            </div>

            <div class="input-panel">

                <textarea
                    id="user-input"
                    placeholder="Введите сообщение..."
                ></textarea>

                <button id="send-button">
                    AIKIVAVIORA
                </button>

            </div>

        </main>

        <footer class="footer">

            <div class="footer-logo">
                AIKIVAVIORA
            </div>

            <div class="world-clocks">

                <div class="clock-card">
                    🇺🇸 USA
                    <span id="clock-usa"></span>
                </div>

                <div class="clock-card">
                    🇬🇧 UK
                    <span id="clock-uk"></span>
                </div>

                <div class="clock-card">
                    🇫🇮 FIN
                    <span id="clock-fin"></span>
                </div>

                <div class="clock-card">
                    🇩🇪 GER
                    <span id="clock-ger"></span>
                </div>

                <div class="clock-card">
                    🇷🇺 RU
                    <span id="clock-ru"></span>
                </div>

            </div>

        </footer>

    </div>

    <script src="/static/js/app.js"></script>

</body>
</html>
